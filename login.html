<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Studio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M15.477 0c.415 0 .749.338.788.752a7.775 7.775 0 006.985 6.984c.413.04.752.373.752.788v6.952c0 .415-.338.748-.752.788a7.775 7.775 0 00-6.985 6.984c-.04.414-.373.752-.788.752H8.525c-.416 0-.749-.338-.789-.752a7.775 7.775 0 00-6.984-6.984c-.414-.04-.752-.373-.752-.788V8.524c0-.415.338-.748.752-.788A7.775 7.775 0 007.736.752C7.776.338 8.11 0 8.526 0h6.95z' fill='%238B5CF6'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                    colors: {
                        accent: { blue: '#007AFF', purple: '#BF5AF2', pink: '#FF375F', cyan: '#5AC8FA' }
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== CSS Variables - Dark Theme ===== */
        [data-theme="dark"] {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-bg-active: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.14);
            --glass-border-strong: rgba(255, 255, 255, 0.24);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-tertiary: rgba(255, 255, 255, 0.45);
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #BF5AF2 50%, #FF375F 100%);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --shadow-button: 0 4px 16px rgba(0, 122, 255, 0.35);
        }

        /* ===== CSS Variables - Light Theme ===== */
        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.70);
            --glass-bg-hover: rgba(255, 255, 255, 0.85);
            --glass-bg-active: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.10);
            --glass-border-strong: rgba(0, 0, 0, 0.20);
            --text-primary: rgba(0, 0, 0, 0.95);
            --text-secondary: rgba(0, 0, 0, 0.65);
            --text-tertiary: rgba(0, 0, 0, 0.45);
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #BF5AF2 50%, #FF375F 100%);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            --shadow-button: 0 4px 16px rgba(0, 122, 255, 0.25);
        }

        /* ===== Base Styles ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ===== Glass Effect ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-glass);
        }

        /* ===== Primary Button ===== */
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
            filter: brightness(1.05);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }

        /* ===== Input ===== */
        .glass-input {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            width: 100%;
            padding: 1rem 1.25rem;
        }
        .glass-input::placeholder {
            color: var(--text-tertiary);
        }
        .glass-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        /* ===== Text Colors ===== */
        .text-primary { color: var(--text-primary); }
        .text-secondary { color: var(--text-secondary); }
        .text-tertiary { color: var(--text-tertiary); }

        /* ===== Accent Gradient Text ===== */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== Animations ===== */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes auroraFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(2%, 3%) scale(1.02); }
            50% { transform: translate(-1%, 5%) scale(0.98); }
            75% { transform: translate(3%, -2%) scale(1.01); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @media (prefers-reduced-motion: reduce) { .animate-float { animation: none; } }

        /* ===== Aurora Background Orbs ===== */
        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.8;
            animation: auroraFloat 20s ease-in-out infinite;
        }
        .aurora-orb:nth-child(2) { animation-delay: -7s; }
        .aurora-orb:nth-child(3) { animation-delay: -14s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <!-- Aurora Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="aurora-orb" style="top: -20%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(0,122,255,0.25) 0%, transparent 70%);"></div>
        <div class="aurora-orb" style="bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(191,90,242,0.20) 0%, transparent 70%);"></div>
        <div class="aurora-orb" style="top: 40%; left: 30%; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(255,55,95,0.15) 0%, transparent 70%);"></div>
        <div class="absolute inset-0" style="opacity: 0.03; background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E');"></div>
    </div>

    <div class="w-full max-w-md">
        <div class="glass p-10 animate-fade-in">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center animate-float" style="background: var(--accent-gradient); box-shadow: 0 8px 32px rgba(0, 122, 255, 0.3);">
                    <svg class="w-10 h-10 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 1 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 1 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 1 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 1 1-.963 0z"/></svg>
                </div>
            </div>
            <!-- Title -->
            <div class="text-center mb-10">
                <h1 class="font-serif text-3xl font-semibold mb-2 text-primary">Welcome Back</h1>
                <p class="text-secondary">Enter your password to continue</p>
            </div>
            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <div class="space-y-3">
                    <label for="password" class="text-sm font-medium text-secondary">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autofocus class="glass-input text-lg">
                </div>
                <button type="submit" class="btn-primary w-full h-14 text-lg">
                    Sign In
                </button>
                <p id="errorMsg" class="hidden text-center text-sm glass p-4" style="border-color: rgba(255, 59, 95, 0.3); color: #FF375F;">
                    Invalid password. Please try again.
                </p>
            </form>
        </div>
        <!-- Footer -->
        <p class="text-center text-tertiary text-sm mt-8">
            Powered by <span class="text-gradient font-semibold">AI Studio</span>
        </p>
    </div>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="glass fixed bottom-6 right-6 w-12 h-12 flex items-center justify-center cursor-pointer transition-all hover:scale-105" style="border-radius: 50%;">
        <svg class="w-5 h-5" id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                themeIcon.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
            } else {
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (res.ok) location.href = '/';
                else errorMsg.classList.remove('hidden');
            } catch (e) {
                errorMsg.innerText = 'Connection error. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
